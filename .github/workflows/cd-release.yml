name: CD - Publish Docker Hub Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-images:
    name: Build and Push Images to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image namespace and version
        id: tags
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          NS="${DOCKERHUB_NAMESPACE}"
          if [[ -z "${NS}" ]]; then
            NS="${DOCKERHUB_USERNAME}"
          fi
          if [[ -z "${NS}" ]]; then
            echo "Missing Docker Hub namespace. Set repo variable DOCKERHUB_NAMESPACE or repo secret DOCKERHUB_USERNAME."
            exit 1
          fi
          echo "namespace=${NS}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          push: true
          tags: |
            ${{ steps.tags.outputs.namespace }}/multi-agent-orchestration-service:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.namespace }}/multi-agent-orchestration-service:latest

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ${{ steps.tags.outputs.namespace }}/multi-agent-orchestration-app:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.namespace }}/multi-agent-orchestration-app:latest
