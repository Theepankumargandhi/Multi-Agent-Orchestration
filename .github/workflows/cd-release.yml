name: CD - Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          push: true
          tags: |
            ghcr.io/${{ steps.tags.outputs.repo_lc }}/service:${{ steps.tags.outputs.version }}
            ghcr.io/${{ steps.tags.outputs.repo_lc }}/service:latest

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ghcr.io/${{ steps.tags.outputs.repo_lc }}/app:${{ steps.tags.outputs.version }}
            ghcr.io/${{ steps.tags.outputs.repo_lc }}/app:latest
