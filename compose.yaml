services:
  agent_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    develop:
      watch:
        - path: agent/
          action: sync+restart
          target: /app/agent/
        - path: schema/
          action: sync+restart
          target: /app/schema/
        - path: service/
          action: sync+restart
          target: /app/service/

  streamlit_app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "8501:8501"
    depends_on:
      - agent_service
    environment:
      - AGENT_URL=http://agent_service:8000
    develop:
      watch:
        - path: client/
          action: sync+restart
          target: /app/client/
        - path: schema/
          action: sync+restart
          target: /app/schema/
        - path: streamlit_app.py
          action: sync+restart
          target: /app/streamlit_app.py

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    depends_on:
      - agent_service
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.2.0
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana_data:
