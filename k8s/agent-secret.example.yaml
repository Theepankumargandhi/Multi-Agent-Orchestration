apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agent-platform
type: Opaque
stringData:
  # Required for auth token signing.
  USER_AUTH_SECRET: "replace-with-long-random-secret"

  # Add at least one model provider key for LLM responses.
  OPENAI_API_KEY: ""
  GROQ_API_KEY: ""

  # Optional.
  LANGSMITH_API_KEY: ""
