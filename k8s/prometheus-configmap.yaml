apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: agent-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: agent_service
        metrics_path: /metrics
        static_configs:
          - targets:
              - agent-service:8000
