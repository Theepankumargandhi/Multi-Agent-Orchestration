apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-app
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-app
  template:
    metadata:
      labels:
        app: streamlit-app
    spec:
      containers:
        - name: streamlit-app
          image: agent-service-toolkit/streamlit-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          envFrom:
            - configMapRef:
                name: streamlit-config
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
